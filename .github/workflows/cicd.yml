name: Node.js CI

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'iac/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Check Prisma Schema Format
        run:  pnpx prisma format --check

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Lint
        run: pnpm lint

      - name: Run Format Check
        run: pnpm check:format

      - name: Run Tests
        run: pnpm test
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Build
        run: pnpm run build

  docker-smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start stack
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/health; then
              echo "Smoke OK"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for /health"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

